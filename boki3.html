<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>簿記3級 仕訳ドリル</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;padding:1.5rem 1rem}
  #app{max-width:720px;margin:0 auto}
  h1{font-size:22px;font-weight:600;margin-bottom:4px}
  .sub{font-size:13px;color:#777;margin-bottom:1.4rem}

  /* フィルター */
  .filter-block{background:#fff;border-radius:12px;border:1px solid #e8e8e4;padding:1rem 1.25rem;margin-bottom:1rem}
  .filter-block h3{font-size:11px;font-weight:600;color:#999;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
  .chip-row{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-size:12px;padding:4px 13px;border-radius:20px;border:1px solid #ddd;background:#fff;color:#888;cursor:pointer;transition:all .12s;user-select:none}
  .chip:hover{border-color:#aaa;color:#555}
  .chip.lv1.on{background:#1D9E75;border-color:#1D9E75;color:#fff}
  .chip.lv2.on{background:#185FA5;border-color:#185FA5;color:#fff}
  .chip.lv3.on{background:#854F0B;border-color:#854F0B;color:#fff}
  .chip.cat.on{background:#533AB7;border-color:#533AB7;color:#fff}

  /* 統計 */
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem}
  .stat{background:#fff;border-radius:10px;border:1px solid #e8e8e4;padding:10px 14px}
  .stat-l{font-size:11px;color:#999;margin-bottom:2px}
  .stat-v{font-size:22px;font-weight:600;color:#1a1a1a}

  /* プログレス */
  .prog-wrap{height:5px;background:#e8e8e4;border-radius:3px;margin-bottom:1rem;overflow:hidden}
  .prog-fill{height:100%;background:#1D9E75;border-radius:3px;transition:width .35s ease}

  /* 問題カード */
  #count-info{font-size:13px;color:#999;margin-bottom:.75rem}
  .q-card{background:#fff;border:1px solid #e8e8e4;border-radius:14px;padding:1.5rem;margin-bottom:.75rem}
  .meta{display:flex;gap:6px;margin-bottom:.9rem;flex-wrap:wrap}
  .badge{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
  .b-lv1{background:#E1F5EE;color:#085041}
  .b-lv2{background:#E6F1FB;color:#0C447C}
  .b-lv3{background:#FAEEDA;color:#633806}
  .b-cat{background:#EEEDFE;color:#26215C}
  .q-text{font-size:15px;line-height:1.7;margin-bottom:1rem;color:#1a1a1a}

  /* 仕訳入力 */
  .jiwake-wrap{display:grid;grid-template-columns:1fr 36px 1fr;gap:8px;align-items:center;margin-bottom:1rem}
  .arrow{text-align:center;font-size:20px;color:#bbb}
  .side-label{font-size:11px;font-weight:600;color:#999;margin-bottom:5px;letter-spacing:.04em;text-transform:uppercase}
  .side select,.side input[type=number]{width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;color:#1a1a1a;background:#fafafa;outline:none;transition:border-color .15s}
  .side select:focus,.side input[type=number]:focus{border-color:#533AB7;background:#fff}
  .side input[type=number]{text-align:right;margin-top:5px}
  .side select{margin-bottom:0}

  /* ボタン */
  .btn{padding:9px 22px;border-radius:9px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-size:14px;font-family:inherit;cursor:pointer;font-weight:500;transition:all .12s}
  .btn:hover{background:#f5f5f0;border-color:#aaa}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
  .btn-primary:hover{background:#333;border-color:#333}
  .btn-full{width:100%;margin-top:.9rem}
  .btn-row{display:flex;gap:8px;margin-top:.25rem}

  /* フィードバック */
  .fb{margin-top:.9rem;padding:12px 16px;border-radius:10px;font-size:14px;line-height:1.65}
  .fb.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
  .fb.ng{background:#FAECE7;color:#711b0c;border:1px solid #F0997B}
  .fb b{font-weight:600}
  .fb small{font-size:12px;opacity:.85;display:block;margin-top:4px}

  /* 空メッセージ */
  .empty-msg{text-align:center;padding:3rem;color:#999;font-size:14px;background:#fff;border-radius:14px;border:1px solid #e8e8e4}

  /* モバイル対応 */
  @media(max-width:560px){
    .stats-row{grid-template-columns:repeat(2,1fr)}
    .jiwake-wrap{grid-template-columns:1fr 24px 1fr;gap:4px}
    .arrow{font-size:16px}
  }
</style>
</head>
<body>
<div id="app">
  <h1>簿記3級 仕訳ドリル</h1>
  <p class="sub">難易度・分野を選んで出題 — 全70問以上</p>

  <div class="filter-block">
    <h3>難易度</h3>
    <div class="chip-row" id="lv-chips">
      <span class="chip lv1 on" data-lv="1" onclick="toggleLv(1)">★ 基礎</span>
      <span class="chip lv2 on" data-lv="2" onclick="toggleLv(2)">★★ 標準</span>
      <span class="chip lv3 on" data-lv="3" onclick="toggleLv(3)">★★★ 応用</span>
    </div>
  </div>

  <div class="filter-block">
    <h3>分野</h3>
    <div class="chip-row" id="cat-chips"></div>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-l">対象問題</div><div class="stat-v" id="s-pool">0</div></div>
    <div class="stat"><div class="stat-l">回答数</div><div class="stat-v" id="s-total">0</div></div>
    <div class="stat"><div class="stat-l">正解数</div><div class="stat-v" id="s-correct">0</div></div>
    <div class="stat"><div class="stat-l">正答率</div><div class="stat-v" id="s-rate">―</div></div>
  </div>

  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  <div id="count-info"></div>
  <div id="q-area"></div>
</div>

  {lv:3,cat:'その他',t:'得意先に対する売掛金 ¥80,000 を同社への買掛金 ¥80,000 と相殺した。',d:'買掛金',c:'売掛金',a:80000,h:'債権債務の相殺消去。同額なのでシンプルに相殺。'},

let selLv = new Set([1,2,3]);
let selCat = new Set(CATS);
let pool = [];
let idx = 0;
let answered = false;
let correct = 0;
let total = 0;
let sessionIdx = 0;

function initCatChips() {
  const el = document.getElementById('cat-chips');
  el.innerHTML = CATS.map(c => `<span class="chip cat on" data-cat="${c}" onclick="toggleCat('${c}')">${c}</span>`).join('');
}

function toggleLv(n) {
  if (selLv.has(n)) { if (selLv.size > 1) selLv.delete(n); }
  else selLv.add(n);
  document.querySelectorAll('#lv-chips .chip').forEach(ch => {
    ch.classList.toggle('on', selLv.has(parseInt(ch.dataset.lv)));
  });
  rebuild();
}

function toggleCat(c) {
  if (selCat.has(c)) { if (selCat.size > 1) selCat.delete(c); }
  else selCat.add(c);
  document.querySelectorAll('#cat-chips .chip').forEach(ch => {
    ch.classList.toggle('on', selCat.has(ch.dataset.cat));
  });
  rebuild();
}

function rebuild() {
  pool = QS.filter(q => selLv.has(q.lv) && selCat.has(q.cat)).sort(() => Math.random() - 0.5);
  idx = 0; answered = false; sessionIdx = 0;
  document.getElementById('s-pool').textContent = pool.length;
  render();
}

function render() {
  const el = document.getElementById('q-area');
  const ci = document.getElementById('count-info');
  if (!pool.length) {
    el.innerHTML = '<div class="empty-msg">条件に合う問題がありません。フィルターを変更してください。</div>';
    ci.textContent = '';
    return;
  }
  const q = pool[idx];
  ci.textContent = `${sessionIdx + 1}問目（プール ${pool.length}問中 ${idx + 1}番）`;
  const lvLabel = ['','★ 基礎','★★ 標準','★★★ 応用'][q.lv];

  let html = `<div class="q-card">
    <div class="meta">
      <span class="badge b-lv${q.lv}">${lvLabel}</span>
      <span class="badge b-cat">${q.cat}</span>
    </div>
    <div class="q-text">${q.t}</div>
    <div class="jiwake-wrap">
      <div class="side">
        <div class="side-label">借方（左）</div>
        <select id="d-acc">${ACCS.map(a => `<option>${a}</option>`).join('')}</select>
        <input type="number" id="d-amt" value="${q.a}" min="0">
      </div>
      <div class="arrow">→</div>
      <div class="side">
        <div class="side-label">貸方（右）</div>
        <select id="c-acc">${ACCS.map(a => `<option>${a}</option>`).join('')}</select>
        <input type="number" id="c-amt" value="${q.a}" min="0">
      </div>
    </div>`;

  if (!answered) {
    html += `<div class="btn-row"><button class="btn btn-primary" onclick="check()">採点する</button></div>`;
  }
  html += `<div id="fb"></div>`;
  if (answered) {
    html += `<button class="btn btn-full" onclick="next()">次の問題へ →</button>`;
  }
  html += `</div>`;
  el.innerHTML = html;
  updateStats();
  updateProg();
}

function check() {
  const q = pool[idx];
  const da = document.getElementById('d-acc').value;
  const ca = document.getElementById('c-acc').value;
  const ok = da === q.d && ca === q.c;
  total++;
  if (ok) correct++;
  answered = true;

  const fb = document.getElementById('fb');
  fb.className = 'fb ' + (ok ? 'ok' : 'ng');
  if (ok) {
    fb.innerHTML = `✓ 正解！　借方: <b>${q.d}</b>　／　貸方: <b>${q.c}</b>`;
  } else {
    fb.innerHTML = `✗ 不正解　正解は　借方: <b>${q.d}</b>　／　貸方: <b>${q.c}</b><small>${q.h}</small>`;
  }

  const card = document.getElementById('q-area').querySelector('.q-card');
  const scoreBtn = card.querySelector('.btn-row');
  if (scoreBtn) scoreBtn.remove();
  const nb = document.createElement('button');
  nb.className = 'btn btn-full';
  nb.textContent = '次の問題へ →';
  nb.onclick = next;
  card.appendChild(nb);
  updateStats();
}

function next() {
  sessionIdx++;
  idx = (idx + 1) % pool.length;
  if (idx === 0) pool.sort(() => Math.random() - 0.5);
  answered = false;
  render();
}

function updateStats() {
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-rate').textContent = total ? Math.round(correct / total * 100) + '%' : '―';
}

function updateProg() {
  const pct = pool.length ? Math.min(Math.round(sessionIdx / pool.length * 100), 100) : 0;
  document.getElementById('prog').style.width = pct + '%';
}

initCatChips();
rebuild();
</script>
